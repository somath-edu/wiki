name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm install

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Prep PDF Directory
        run: |
          mkdir -p web/public/pdf/chapter01
          ls -R print  # 파일 구조 확인용 로그

      - name: Compile PDF (Type 01 Low)
        run: |
          typst compile --root . print/chapter01/type01_low.typ web/public/pdf/chapter01/type01_low.pdf || (echo "Typst Compile Failed!" && exit 1)

      - name: Verify PDF Creation
        run: ls -l web/public/pdf/chapter01/type01_low.pdf

      - name: Build Astro App
        run: |
          cd web
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
