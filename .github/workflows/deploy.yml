name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm install

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Build PDF and Astro
        run: |
          # 1. 경로 강제 생성
          mkdir -p web/public/pdf/chapter01
          
          # 2. 디버깅 로그 (파일 확인)
          echo "Current Path: $(pwd)"
          ls -R print
          
          # 3. Typst 컴파일 (절대 경로 활용 시도)
          typst compile --root . print/chapter01/type01_low.typ web/public/pdf/chapter01/type01_low.pdf
          
          # 4. Astro 빌드
          cd web
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
